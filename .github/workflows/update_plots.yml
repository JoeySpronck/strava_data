name: Update plots from Strava

on:
  workflow_dispatch:  # allows manual trigger
  push:
    branches:
      - main  # regenerate plots after every push to main
  schedule:
    - cron: '5 0 * * *'  # runs every day at 00:05 UTC (after midnight in europe)

jobs:
  update-plots:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # base branch where your script currently lives
          token: ${{ secrets.GITHUB_TOKEN }}  # allows push
          persist-credentials: true  # This is key for pushing back

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run update script
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_CLIENT_REFRESH_TOKEN: ${{ secrets.STRAVA_CLIENT_REFRESH_TOKEN }}
        run: |
          python update_plots.py

      - name: Add cache-busting token to plot filenames
        # Append a per-run token to every plot filename + patch the markdown refs so the
        # GitHub app stops serving stale images. Runs only here on the publish path — main
        # keeps clean, hand-editable filenames. See .github/helper_scripts/add_cache_token_to_image_names.py.
        run: |
          python .github/helper_scripts/add_cache_token_to_image_names.py "$(date -u +%Y%m%d%H%M%S)"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B plot_updates
          # On plot_updates the plots dashboard becomes the README so GitHub renders it
          # for this branch. main keeps its own short, repo-focused README.md.
          mv -f PLOTS.md README.md
          git add .
          COMMIT_DATE=$(date -u +"%Y-%m-%d")
          git commit -m "Update plots from Strava - ${COMMIT_DATE}" || echo "No changes to commit"
          git push origin plot_updates --force
